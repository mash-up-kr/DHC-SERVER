  /view/users/{userId}/analysis:
    get:
      summary: "Get Analysis View"
      description: "Get user's spending analysis and mission completion statistics with generation comparison data"
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: "User ID"
          example: "507f1f77bcf86cd799439011"
      responses:
        "200":
