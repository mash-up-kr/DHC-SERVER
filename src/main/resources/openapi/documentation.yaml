        | LV5 | мқҖ ліөмЈјлЁёлӢҲ | 600 |
        | LV6 | кёҲ ліөмЈјлЁёлӢҲ | 800 |
        | LV7 | л°ұкёҲ ліөмЈјлЁёлӢҲ | 1000 |
        | **LV8** | **лӢӨмқҙм•„ ліөмЈјлЁёлӢҲ** | **1300** |
        | LV9 | лЈЁл№„ ліөмЈјлЁёлӢҲ | 1700 |
        | LV10 | н”„лҰ¬лҜём—„ ліөмЈјлЁёлӢҲ | 2200 |

        ### м—°к°„ мҡҙм„ё н•ҙкёҲ
        **LV8 (1300pt) мқҙмғҒ**л¶Җн„° м—°к°„ мҡҙм„ё(`POST /api/users/{userId}/yearly-fortune`) мӮ¬мҡ©мқҙ к°ҖлҠҘн•©лӢҲлӢӨ.

        ### мӮ¬мҡ© мӢңлӮҳлҰ¬мҳӨ
        - **л ҲлІЁ 8 н…ҢмҠӨнҠё**: `point: 1300` вҶ’ LV8 лӢ¬м„ұ, м—°к°„ мҡҙм„ё н•ҙкёҲ
        - **мөңкі  л ҲлІЁ н…ҢмҠӨнҠё**: `point: 2200` вҶ’ LV10
        - **мҙҲкё° мғҒнғң ліөмӣҗ**: `point: 0` вҶ’ LV1
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: "User ID"
          example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QaPointRequest"
            examples:
              level_8:
                summary: "LV8 лӢ¬м„ұ (м—°к°„ мҡҙм„ё н•ҙкёҲ)"
                value:
                  point: 1300
              level_10:
                summary: "LV10 мөңкі  л ҲлІЁ"
                value:
                  point: 2200
              reset:
                summary: "нҸ¬мқёнҠё мҙҲкё°нҷ” (LV1)"
                value:
                  point: 0
      responses:
        "200":
          description: "нҸ¬мқёнҠё м„Өм • мҷ„лЈҢ"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QaPointResponse"
              example:
                success: true
                point: 1300
                level: 8
        "404":
          description: "User not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/qa/users/{userId}/yearly-fortune:
    delete:
      tags:
        - QA
      summary: "[QA] м—°к°„ мҡҙм„ё мӮ¬мҡ© лӮҙм—ӯ мӮӯм ң"
      description: |
        **QA н…ҢмҠӨнҠё м „мҡ© API** - мң м Җмқҳ м—°к°„ мҡҙм„ё мӮ¬мҡ© кё°лЎқмқ„ мӮӯм ңн•ҳм—¬ лӢӨмӢң мӮ¬мҡ©н•  мҲҳ мһҲлҸ„лЎқ мӣҗліөн•©лӢҲлӢӨ.

        мқҙ APIлҘј нҳём¶ңн•ҳл©ҙ:
        - `yearlyFortuneUsed` вҶ’ `false`лЎң ліҖкІҪ
        - `yearlyFortune` вҶ’ `null`лЎң мӮӯм ң

        ### мӮ¬мҡ© мӢңлӮҳлҰ¬мҳӨ
        1. нҸ¬мқёнҠё APIлЎң LV8 мқҙмғҒ м„Өм • (`PUT /api/qa/users/{userId}/point` вҶ’ `{ "point": 1300 }`)
        2. м—°к°„ мҡҙм„ё мғқм„ұ (`POST /api/users/{userId}/yearly-fortune`)
        3. м—°к°„ мҡҙм„ё нҷ•мқё (`GET /view/users/{userId}/yearly-fortune`)
        4. **мқҙ APIлЎң мӣҗліө** (`DELETE /api/qa/users/{userId}/yearly-fortune`)
        5. лӢӨмӢң 2лІҲл¶Җн„° л°ҳліө н…ҢмҠӨнҠё к°ҖлҠҘ

        ### мЈјмқҳмӮ¬н•ӯ
        - мқҙ APIлҠ” `yearlyFortuneUsed` н”Ңлһҳк·ёл§Ң лҰ¬м…Ӣн•©лӢҲлӢӨ. нҸ¬мқёнҠё/л ҲлІЁмқҖ лі„лҸ„лЎң кҙҖлҰ¬н•ҳм„ёмҡ”.
        - м—°к°„ мҡҙм„ё мһ¬мғқм„ұ мӢң Gemini APIк°Җ лӢӨмӢң нҳём¶ңлҗҳлҜҖлЎң лӢӨлҘё кІ°кіјк°Җ лӮҳмҳ¬ мҲҳ мһҲмҠөлӢҲлӢӨ.
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: "User ID"
          example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: "м—°к°„ мҡҙм„ё мӮ¬мҡ© лӮҙм—ӯ мӮӯм ң мҷ„лЈҢ"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QaSuccessResponse"
              example:
                success: true
        "404":
          description: "User not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

