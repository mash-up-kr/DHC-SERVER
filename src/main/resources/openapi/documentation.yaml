      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: "User ID"
          example: "507f1f77bcf86cd799439011"
      responses:
        "200":
          description: "нҳ„мһ¬ мҳӨлІ„лқјмқҙл“ң мғҒнғң"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QaHomeStateRequest"
              example:
                longAbsence: true
                yesterdayMissionSuccess: null
                todayDone: null
                isFirstAccess: null
    put:
      tags:
        - QA
      summary: "[QA] нҷҲ нҷ”л©ҙ мғҒнғң мҳӨлІ„лқјмқҙл“ң"
      description: |
        **QA н…ҢмҠӨнҠё м „мҡ© API** - нҷҲ нҷ”л©ҙ(`/view/users/{userId}/home`)мқҳ `longAbsence`, `yesterdayMissionSuccess`, `todayDone` к°’мқ„ к°•м ңлЎң м„Өм •н•©лӢҲлӢӨ.

        мқҙ 3к°ң к°’мқҖ мӣҗлһҳ м„ңлІ„м—җм„ң л§ӨлІҲ кі„мӮ°лҗҳлҠ” к°’мқҙлҜҖлЎң, мқҙ APIлЎң мҳӨлІ„лқјмқҙл“ңлҘј м„Өм •н•ҳл©ҙ кі„мӮ° кІ°кіј лҢҖмӢ  мҳӨлІ„лқјмқҙл“ң к°’мқҙ л°ҳнҷҳлҗ©лӢҲлӢӨ.

        ### мӮ¬мҡ© мӢңлӮҳлҰ¬мҳӨ
        - **2мқј мқҙмғҒ лҜём ‘мҶҚ нҷ”л©ҙ н…ҢмҠӨнҠё**: `longAbsence: true` м„Өм •
        - **м–ҙм ң лҜём…ҳ м„ұкіө нӣ„ нҷҲ нҷ”л©ҙ н…ҢмҠӨнҠё**: `yesterdayMissionSuccess: true` м„Өм •
        - **мҳӨлҠҳ лҜём…ҳ мҷ„лЈҢ нӣ„ нҷ”л©ҙ н…ҢмҠӨнҠё**: `todayDone: true` м„Өм •
        - **мЎ°н•© н…ҢмҠӨнҠё**: м—¬лҹ¬ к°’мқ„ лҸҷмӢңм—җ м„Өм • к°ҖлҠҘ

        ### мҳӨлІ„лқјмқҙл“ң н•ҙм ң
        к°Ғ н•„л“ңлҘј `null`лЎң ліҙлӮҙл©ҙ мҳӨлІ„лқјмқҙл“ңк°Җ н•ҙм ңлҗҳкі  мӣҗлһҳ кі„мӮ° лЎңм§ҒмңјлЎң ліөмӣҗлҗ©лӢҲлӢӨ.
        ```json
        { "longAbsence": null, "yesterdayMissionSuccess": null, "todayDone": null }
        ```

        ### мЈјмқҳмӮ¬н•ӯ
        - мҳӨлІ„лқјмқҙл“ңлҠ” н•ҙлӢ№ мң м Җм—җкІҢ мҳҒкө¬м ҒмңјлЎң м Ғмҡ©лҗ©лӢҲлӢӨ (н•ҙм ңн•  л•Ңк№Ңм§Җ)
        - QA н…ҢмҠӨнҠё мҷ„лЈҢ нӣ„ л°ҳл“ңмӢң `null`лЎң мҙҲкё°нҷ”н•ҳм„ёмҡ”
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: "User ID"
          example: "507f1f77bcf86cd799439011"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QaHomeStateRequest"
            examples:
              long_absence_true:
                summary: "2мқј мқҙмғҒ лҜём ‘мҶҚ мғҒнғңлЎң м„Өм •"
                value:
                  longAbsence: true
                  yesterdayMissionSuccess: null
                  todayDone: null
              all_true:
                summary: "лӘЁл“  к°’ trueлЎң м„Өм •"
                value:
                  longAbsence: true
                  yesterdayMissionSuccess: true
                  todayDone: true
              reset_all:
                summary: "лӘЁл“  мҳӨлІ„лқјмқҙл“ң н•ҙм ң (мӣҗлһҳ кі„мӮ° лЎңм§Ғ ліөмӣҗ)"
                value:
                  longAbsence: null
                  yesterdayMissionSuccess: null
                  todayDone: null
      responses:
        "200":
          description: "мҳӨлІ„лқјмқҙл“ң м„Өм • мҷ„лЈҢ"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QaSuccessResponse"
              example:
                success: true
        "404":
          description: "User not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - QA
      summary: "[QA] нҷҲ нҷ”л©ҙ мғҒнғң мҳӨлІ„лқјмқҙл“ң мҙҲкё°нҷ”"
      description: "лӘЁл“  мҳӨлІ„лқјмқҙл“ңлҘј nullлЎң мҙҲкё°нҷ”н•ҳм—¬ мӣҗлһҳ кі„мӮ° лЎңм§ҒмңјлЎң ліөмӣҗн•©лӢҲлӢӨ."
      parameters:
